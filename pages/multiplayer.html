<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplayer Arena - NoobDev</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/typing.css" />
    <link rel="stylesheet" href="../assets/css/multiplayer.css" />
  </head>
  <body>
    <div class="stars" id="starsContainer"></div>
    <div class="moon"></div>
    <div class="clouds">
      <div class="cloud cloud1"></div>
      <div class="cloud cloud2"></div>
    </div>

    <nav></nav>

    <div class="multiplayer-wrapper">
      <div id="lobbySection" class="lobby-container section-transition">
        <div class="loading">Loading Arena...</div>
      </div>

      <section
        id="gameSection"
        class="game-section section-transition"
        style="display: none"
      >
        <div class="game-shell">
          <!-- Race Track at the Top -->
          <div class="race-track-panel">
            <div id="raceTrack" class="race-track-list"></div>
          </div>

          <header class="game-topbar">
            <div class="game-title-block">
              <div class="match-meta" id="matchMeta"></div>
            </div>

            <div class="stats-bar">
              <div class="stat-group">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label" data-translate="statWPM">WPM</div>
              </div>
              <div class="stat-group">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label" data-translate="statAcc">ACC</div>
              </div>
              <div class="stat-group">
                <div class="stat-value" id="timeLeft">0:00</div>
                <div class="stat-label" data-translate="statTime">TIME</div>
              </div>
            </div>

            <div class="nav-controls">
              <span class="live-badge" id="gameStatusBadge">Racing</span>
              <button
                class="nav-control-btn icon"
                id="btnSound"
                title="Toggle Sound"
              >
                <i class="fas fa-volume-up"></i>
              </button>
              <button
                class="nav-control-btn icon"
                onclick="location.reload()"
                title="Leave Match"
              >
                <i class="fas fa-sign-out-alt"></i>
              </button>
            </div>
          </header>

          <div class="game-main-area">
            <div class="typing-box-wrapper" id="typingWrapper">
              <input
                type="text"
                id="inputField"
                class="input-field"
                autocomplete="off"
              />
              <div class="typing-box" id="quoteDisplay"></div>
              <div class="focus-overlay" id="focusOverlay">
                <div class="start-msg">
                  <i class="fas fa-keyboard"></i>
                  <span>Click here or press any key to focus</span>
                </div>
              </div>
            </div>
          </div>

          <div class="game-footer-area">
            <div class="keyboard-container"></div>

            <div class="mp-chart-container">
              <div class="panel-heading">
                <div>
                  <h3>Live WPM Race</h3>
                </div>
              </div>
              <canvas id="mpChart"></canvas>
            </div>
          </div>

          <!-- Hidden Elements for JS logic -->
          <div id="readySummary" style="display: none"></div>
          <div id="miniRoomEvents" style="display: none"></div>
        </div>

        <div class="countdown-overlay" id="countdownOverlay">
          <div class="countdown-card">
            <div class="countdown-number" id="countdownNumber">3</div>
          </div>
        </div>
      </section>
    </div>

    <div class="result-overlay section-transition" id="resultOverlay">
      <div class="result-card">
        <h2 data-translate="gameOver">Match Finished</h2>

        <div class="result-stats">
          <div class="res-item">
            <div class="big-num" id="finalWpm">0</div>
            <span data-translate="statWPM">WPM</span>
          </div>
          <div class="res-item">
            <div class="big-num" id="finalAcc">0%</div>
            <span data-translate="statAcc">Accuracy</span>
          </div>
          <div class="res-item">
            <div class="big-num" id="finalTime">0:00</div>
            <span data-translate="statTime">Time</span>
          </div>
        </div>

        <div class="result-leaderboard">
          <div id="finalLeaderboard" class="final-leaderboard"></div>
        </div>

        <div class="result-actions">
          <button class="cta-button" onclick="location.reload()">
            Back to Lobby
          </button>
          <button class="btn-secondary" id="btnCopyRoomCodeResult">
            <i class="fas fa-copy"></i> Copy Link
          </button>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="../assets/js/pages/multiplayer.js"></script>
  </body>
</html>
